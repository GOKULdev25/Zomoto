<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomoto - AI Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: monospace; background: white; z-index: 9999; position: relative;"><h1>Frontend Error</h1><p>' + message + '</p><pre>' + (error ? error.stack : '') + '</pre></div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
